<section class="panel card">
  <div class="panel-header">
    <div>
      <h1>Liste des factures</h1>
      <p>Gérez l’historique de facturation de SPA en un coup d’œil.</p>
    </div>
    <div class="panel-actions">
      <input
        class="input"
        type="search"
        placeholder="Rechercher par numéro ou client"
        [formControl]="searchControl"
      >
      <a class="btn primary" routerLink="/invoices/new">Nouveau</a>
    </div>
  </div>

  <div class="table">
    <div class="table-row table-head">
      <div>Numéro</div>
      <div>Date</div>
      <div>Client</div>
      <div>Total TTC</div>
      <div>Actions</div>
    </div>
    <div class="table-row" *ngFor="let invoice of filteredInvoices$ | async">
      <div class="mono">{{ invoice.numero }}</div>
      <div>{{ invoice.date | date:'dd/MM/yyyy' }}</div>
      <div>{{ invoice.client.nom }}</div>
      <div class="amount">{{ totalTTC(invoice) | number:'1.2-2' }} DT</div>
      <div class="actions">
<a
  class="btn outline"
  [routerLink]="['/invoices', invoice.id, 'preview']"
  [queryParams]="{ id: invoice.id }"
>
  Aperçu
</a>
        <a class="btn ghost"  [routerLink]="['/invoices', invoice.id, 'edit']">Modifier</a>
        <button class="btn danger" type="button" (click)="deleteInvoice(invoice)">Supprimer</button>
      </div>
    </div>
  </div>

  <div class="empty" *ngIf="(filteredInvoices$ | async)?.length === 0">
    Aucune facture trouvée.
  </div>
</section>
