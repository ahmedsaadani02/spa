<header class="app-header" *ngIf="!isLoginRoute">
  <div class="header-inner">
    <!-- Brand -->
    <div class="brand">
      <!-- Logo Mark (letters only OR your image) -->
      <div class="brand-mark">
        <!-- Option A: keep your image -->
        <img
          src="assets/logospa.png"
          alt="SPA – Société d’Aluminium"
          class="brand-logo"
        />

        <!-- Option B: letters only (uncomment if you prefer)
        <span class="brand-mark-text">SPA</span>
        -->
      </div>

      <div class="brand-text">
        <h1 class="brand-title">SPA — Société d’Aluminium</h1>
        <span class="brand-subtitle">Facturation | Vente &amp; Fabrication</span>
      </div>
    </div>

    <!-- Desktop Nav -->
    <nav class="nav" *ngIf="isLoggedIn">
      <a *ngIf="isAdmin" routerLink="/invoices" routerLinkActive="active">
        <span class="nav-icon">🧾</span>
        Factures
      </a>

      <a *ngIf="isAdmin" routerLink="/quotes" routerLinkActive="active">
        <span class="nav-icon">📄</span>
        Devis
      </a>

      <a routerLink="/stock" routerLinkActive="active">
        <span class="nav-icon">📦</span>
        Stock
      </a>

      <a *ngIf="isAdmin" routerLink="/stock/history" routerLinkActive="active">
        <span class="nav-icon">🕘</span>
        Historique
      </a>

      <a *ngIf="isAdmin" routerLink="/estimation" routerLinkActive="active">
        <span class="nav-icon">🧮</span>
        Estimation
      </a>
    </nav>

    <!-- Right Actions -->
    <div class="actions" *ngIf="isLoggedIn">
      <a *ngIf="isAdmin" class="btn-primary" routerLink="/invoices/new">
        <span class="nav-icon">➕</span>
        Nouvelle facture
      </a>

      <div class="divider"></div>

      <div class="user">
        <div class="user-text" *ngIf="username">
          <span class="user-name">{{ username }}</span>
          <span class="user-role">{{ role }}</span>
        </div>
        <div class="avatar">
          {{ (username?.[0] || 'A') | uppercase }}{{ (username?.[1] || 'U') | uppercase }}
        </div>
      </div>

      <button class="btn-logout" type="button" (click)="logout()">
        ⎋
        <span class="logout-text">Déconnexion</span>
      </button>
    </div>
  </div>

  <!-- (Optional) Mobile menu placeholder like your Tailwind version -->
  <!-- You can implement actual toggle logic later -->
  <!--
  <div class="mobile-nav">
    ...
  </div>
  -->
</header>

<main class="app-main">
  <router-outlet></router-outlet>
</main>

<footer class="app-footer" *ngIf="!isLoginRoute">
  SPA — Société d’Aluminium · Merci pour votre confiance
</footer>
